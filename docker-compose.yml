services:

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: price-tracker-backend
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: "price-tracker-secret-key-2026"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://frontend:3000"
      DB_PATH: "/app/db/db.sqlite3"
      SCRAPER_TIMEOUT_SECONDS: "25"
      SCRAPER_CONCURRENCY: "4"
    volumes:
      - db_data:/app/db
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/dashboard/"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: price-tracker-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: "http://backend:8000"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
    name: price-tracker-db
